<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Open Graph — WhatsApp / Facebook / Twitter preview card -->
  <meta property="og:title"       content="ClinicSync — Clinic Management on the go" />
  <meta property="og:description" content="Manage patients, registrations, follow-ups, appointments, transactions with detailed analytics on fingertips — anywhere, anytime." />  
  <meta property="og:image"       content="https://apdaga.github.io/ClinicSync/icons/icon-512.png" />
  <meta property="og:image:width"  content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:url"         content="https://apdaga.github.io/ClinicSync/" />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="ClinicSync" />

  <!-- Twitter card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="ClinicSync — Clinical Patient Management" />
  <meta name="twitter:description" content="Manage patients, follow-ups, appointments and analytics — anywhere, anytime." />
  <meta name="twitter:image"       content="https://apdaga.github.io/ClinicSync/icons/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a5276;
    }

    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #1a5276;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img {
      width: 100px; height: 100px;
      border-radius: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      background-color: #1a5276;
    }
    #splash h1 {
      color: #fff;
      font-size: 28px;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }
    #splash p {
      color: #17a589;
      font-size: 14px;
      font-family: Arial, sans-serif;
      margin-top: 8px;
    }
    .spinner {
      margin-top: 36px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #17a589;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <iframe id="app-frame"
    src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
    allow="clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
  ></iframe>

  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <!-- Offline screen — shown when GAS iframe fails to load -->
  <div id="offline-screen" style="display:none;position:fixed;inset:0;z-index:200;
    background:#f0f4f8;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;gap:16px;font-family:Arial,sans-serif">
    <div style="font-size:64px;line-height:1">📡</div>
    <h2 style="margin:0;font-size:20px;color:#1a5276;font-weight:700">No Internet Connection</h2>
    <p style="margin:0;color:#5d6d7e;font-size:14px;line-height:1.7;max-width:280px">
      ClinicSync needs an internet connection to reach the server.<br>
      Please check your Wi-Fi or mobile data and try again.
    </p>
    <button id="retry-btn" onclick="retryLoad()"
      style="margin-top:8px;padding:13px 32px;background:#1a5276;color:white;border:none;
      border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;gap:10px;letter-spacing:0.3px">
      &#8635; Retry
    </button>
    <p id="offline-status" style="margin:0;font-size:12px;color:#999">
      Waiting for connection…
    </p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    var gone    = false;
    var offlineShown = false;
    var LOAD_TIMEOUT = 10000; // show offline screen if iframe hasn't loaded in 10s
    var loadTimer = null;

    function hideSplash() {
      if (gone) return; gone = true;
      var s = document.getElementById('splash');
      s.classList.add('fade-out');
      setTimeout(function() { s.style.display = 'none'; }, 550);
    }

    function showOffline() {
      if (offlineShown) return;
      offlineShown = true;
      hideSplash();
      document.getElementById('offline-screen').style.display = 'flex';
    }

    function hideOffline() {
      offlineShown = false;
      document.getElementById('offline-screen').style.display = 'none';
    }

    function retryLoad() {
      var st  = document.getElementById('offline-status');
      var btn = document.getElementById('retry-btn');
      st.textContent  = 'Connecting…';
      btn.disabled    = true;
      btn.textContent = '⏳ Connecting…';

      hideOffline();
      // Reload the iframe by re-setting its src
      var frame = document.getElementById('app-frame');
      var src   = frame.src;
      frame.src = '';
      setTimeout(function() {
        frame.src = src;
        gone = false; // allow splash to show again briefly
        document.getElementById('splash').style.display = 'flex';
        document.getElementById('splash').style.opacity = '1';
        document.getElementById('splash').classList.remove('fade-out');
        // Reset timeout
        clearTimeout(loadTimer);
        loadTimer = setTimeout(function() {
          btn.disabled    = false;
          btn.innerHTML   = '&#8635; Retry';
          st.textContent  = "Still can't reach the server. Check your connection.";
          showOffline();
        }, LOAD_TIMEOUT);
      }, 100);
    }

    // Iframe loaded successfully
    document.getElementById('app-frame').addEventListener('load', function() {
      clearTimeout(loadTimer);
      if (!offlineShown) {
        setTimeout(hideSplash, 700);
      }
    });

    // Iframe load error (net::ERR_NAME_NOT_RESOLVED etc.)
    document.getElementById('app-frame').addEventListener('error', function() {
      clearTimeout(loadTimer);
      showOffline();
    });

    // Timeout fallback — iframe load event may not fire on Android network error
    loadTimer = setTimeout(function() {
      showOffline();
    }, LOAD_TIMEOUT);

    // Auto-retry when device comes back online
    window.addEventListener('online', function() {
      var st = document.getElementById('offline-status');
      if (offlineShown) {
        st.textContent = 'Connection detected — retrying…';
        setTimeout(retryLoad, 1000);
      }
    });

  </script>

</body>
</html>
