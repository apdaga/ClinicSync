<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ClinicSync</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5276" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ClinicSync" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a5276;
    }

    /*
     * BANNER HIDING STRATEGY
     * ───────────────────────────────────────────────────────────────
     * Problem: GAS injects a ~48px info banner above all iframe
     * content. Its exact height varies by browser/device/zoom level
     * making pixel-offset approaches fragile.
     *
     * Solution: Two-layer approach
     *   Layer 1 — iframe is pushed up by a GENEROUS fixed offset
     *             (larger than the banner on any device), clipped by
     *             overflow:hidden on the wrapper.
     *   Layer 2 — A navy overlay strip sits on top with
     *             pointer-events:none. It covers any residual banner
     *             pixels AND the portion of the app header that got
     *             clipped by the generous offset.
     *             Since the app header is ALSO navy (#1a5276), the
     *             overlay blends pixel-perfectly — it looks like the
     *             app header starts flush at the screen edge.
     *             Clicks pass through to the iframe below normally.
     * ───────────────────────────────────────────────────────────────
     */

    /* Clips overflow — hides whatever is pushed above the fold */
    #frame-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    /* Iframe pushed up generously; height compensated */
    #app-frame {
      position: absolute;
      left: 0;
      width: 100%;
      border: none;
      /* JS sets top and height responsively */
    }

    /*
     * Navy overlay — sits above iframe, pointer-events:none so
     * all clicks pass through to the iframe beneath it.
     * Height = generous offset so it covers exactly what we clipped.
     * Color = #1a5276 = exact same as app header → seamless blend.
     */
    #banner-mask {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #1a5276;
      pointer-events: none;   /* ← clicks pass through */
      z-index: 50;
      /* height set by JS to match iframe offset */
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      background: #1a5276;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img {
      width: 100px; height: 100px;
      border-radius: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #splash h1 {
      color: #fff;
      font-size: 28px;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }
    #splash p {
      color: #17a589;
      font-size: 14px;
      font-family: Arial, sans-serif;
      margin-top: 8px;
    }
    .spinner {
      margin-top: 36px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #17a589;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Layer 1: iframe pushed up, clipped by wrapper -->
  <div id="frame-wrapper">
    <iframe
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycby4FymWf-e1EYy0TD9VB9IWKHC-EXe8f87w0Wv70y41KiyHSr4oT-6d17VNREvvI8g2pA/exec"
      allow="clipboard-read; clipboard-write"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
    ></iframe>
  </div>

  <!-- Layer 2: navy mask — covers residual banner + clipped header,
       blends with app header color, clicks pass through -->
  <div id="banner-mask"></div>

  <!-- Splash -->
  <div id="splash">
    <img src="icons/icon-192.png" alt="ClinicSync" />
    <h1>ClinicSync</h1>
    <p>Clinical Patient Management</p>
    <div class="spinner"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }

    var frame  = document.getElementById('app-frame');
    var mask   = document.getElementById('banner-mask');
    var splash = document.getElementById('splash');

    /*
     * Offset = how far we push the iframe up.
     * Must be >= GAS banner height on the device.
     * We use generous values with comfortable headroom.
     *
     * The app header (~56px tall, same navy color) absorbs any
     * over-clip — the mask div covers it with the identical color
     * so the visual result is always a clean, flush header.
     *
     * Breakpoints mirror common device categories:
     *   >= 1024px  desktop / tablet landscape
     *    600-1023  tablet portrait
     *    < 600     phone
     */
    function getOffset() {
      var w = window.innerWidth;
      if (w >= 1024) return 56;
      if (w >=  600) return 64;
      return 72;
    }

    function applyLayout() {
      var offset = getOffset();
      // Push iframe up
      frame.style.top    = '-' + offset + 'px';
      frame.style.height = 'calc(100% + ' + offset + 'px)';
      // Mask covers exactly the same height
      mask.style.height  = offset + 'px';
    }

    applyLayout();
    window.addEventListener('resize', applyLayout);

    // Splash
    var gone = false;
    function hideSplash() {
      if (gone) return;
      gone = true;
      splash.classList.add('fade-out');
      setTimeout(function() { splash.style.display = 'none'; }, 550);
    }
    frame.addEventListener('load', function() { setTimeout(hideSplash, 700); });
    setTimeout(hideSplash, 10000);
  </script>

</body>
</html>
